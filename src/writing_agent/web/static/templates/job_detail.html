<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Detail</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body data-page="job" data-job-id="__JOB_ID__">
    <main class="shell">
      <header class="topbar">
        <div class="brand"><h1>任务详情</h1><p id="jobTitle">加载中...</p></div>
        <nav class="nav"><a href="/">写作任务</a><a href="/collections">Collections</a><a href="/documents">Documents</a><a href="/settings">Settings</a></nav>
      </header>
      <section class="grid">
        <div class="panel">
          <h2>状态</h2>
          <div id="jobSummary"></div>
          <h3>实时日志</h3>
          <pre class="log" id="jobLog"></pre>
          <h3>Agent Timeline</h3>
          <pre id="agentTimeline"></pre>
          <div id="reviewBox" class="hidden">
            <h3>人工审阅</h3>
            <pre id="interruptPayload"></pre>
            <textarea id="reviewText" placeholder="输入提纲或终稿审阅意见"></textarea>
            <button id="resumeButton">提交审阅并继续</button>
          </div>
        </div>
        <aside class="panel">
          <h2>输出文件</h2>
          <div id="jobOutputs"></div>
          <div class="toolbar">
            <button class="secondary" id="refreshJob">刷新</button>
            <a href="/documents">查看全部文档</a>
          </div>
        </aside>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
